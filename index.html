<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>蔡叔叔比薩屋 - 銷售看板</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍕 蔡叔叔比薩屋 - 銷售即時看板</h2>
    <table id="history-table">
        <tr><th>日期</th><th>9吋厚</th><th>12吋厚</th><th>9吋薄</th><th>12吋薄</th></tr>
        <tr><td colspan="5">讀取中...</td></tr>
    </table>
</div>

<script>
    // --- 重要：請將這串網址換成您剛剛部署好的 /exec 網址 ---
    const SPREADSHEET_API = "https://script.google.com/macros/s/AKfycbw2cR6jq4dNo7vIgfu7xNnDpYI2Y3t37hNiD74oczCwRUrdcTC_6J1iX1LoSzw3y6X9sQ/exec";

    function updateTable() {
        fetch(SPREADSHEET_API)
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById('history-table');
                table.innerHTML = `<tr><th>日期</th><th>9吋厚</th><th>12吋厚</th><th>9吋薄</th><th>12吋薄</th></tr>`;
                data.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(row => {
                    table.innerHTML += `<tr>
                        <td>${row.date}</td>
                        <td>${row.s9s}</td>
                        <td>${row.s12s}</td>
                        <td>${row.s9t}</td>
                        <td>${row.s12t}</td>
                    </tr>`;
                });
            })
            .catch(err => {
                document.getElementById('history-table').innerHTML = "<tr><td colspan='5'>無法讀取資料，請確認 Apps Script 已公開部署</td></tr>";
            });
    }

    updateTable();
    setInterval(updateTable, 10000); // 每10秒自動更新
</script>
</body>
</html>
